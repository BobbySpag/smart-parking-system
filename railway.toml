[build]
builder = "dockerfile"

[[services]]
name = "postgres"

[services.source]
image = "postgres:15-alpine"

[services.variables]
POSTGRES_USER = "postgres"
POSTGRES_PASSWORD = "${{POSTGRES_PASSWORD}}"
POSTGRES_DB = "smart_parking"

[[services]]
name = "backend"

[services.build]
dockerfilePath = "backend/Dockerfile"
buildContext = "backend"

[services.deploy]
startCommand = "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
healthcheckPath = "/health"
healthcheckTimeout = 30

[services.variables]
DATABASE_URL = "postgresql+asyncpg://postgres:${{POSTGRES_PASSWORD}}@${{Postgres.RAILWAY_PRIVATE_DOMAIN}}:5432/smart_parking"
SECRET_KEY = "${{SECRET_KEY}}"
ALGORITHM = "HS256"
ACCESS_TOKEN_EXPIRE_MINUTES = "30"
PORT = "8000"

[[services]]
name = "frontend"

[services.build]
dockerfilePath = "frontend/Dockerfile"
buildContext = "frontend"

[services.variables]
REACT_APP_API_URL = "https://${{backend.RAILWAY_PUBLIC_DOMAIN}}"
PORT = "3000"
